name: UnlistedZone Price Scraper

on:
  schedule:
    # High Priority: Runs twice daily at 02:00 and 14:00 UTC (approx 7:30 AM and 7:30 PM IST)
    - cron: '0 2,14 * * *'
    # All Stocks: Runs every 3 days at 00:00 UTC (approx 5:30 AM IST)
    - cron: '0 0 */3 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape Mode (high-priority or all)'
        required: true
        default: 'high-priority'
        type: choice
        options:
        - high-priority
        - all

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Determine Mode and Run Scraper
        run: |
          # If triggered manually, use the input mode. Otherwise, determine by cron.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "0 0 */3 * *" ]; then
            MODE="all"
          else
            MODE="high-priority"
          fi
          
          echo "Running scraper with mode: $MODE"
          python unlistedzone_price_scraper.py --mode $MODE
        env:
          PRIORITY_STOCKS: ${{ secrets.PRIORITY_STOCKS }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add prices.csv
          
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update prices [skip ci]" && git push)
